name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone dotfiles (for tsq.py / tsqx.py)
        run: git clone --depth=1 https://github.com/vEnhance/dotfiles.git ~/dotfiles

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y asymptote imagemagick texlive-base texlive-fonts-recommended

      - name: Install CoffeeScript
        run: npm install -g coffeescript

      - name: Build site
        run: make

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
